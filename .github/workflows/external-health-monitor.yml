name: 股票监测助手外部健康监测

on:
  schedule:
    - cron: '2-57/5 * * * *'
  workflow_dispatch:
    inputs:
      health_url:
        description: '仅用于受控验收；留空时检查正式健康端点'
        required: false
        default: 'https://stock-monitor-murex-one.vercel.app/api/health'

permissions:
  contents: read
  issues: write

concurrency:
  group: stock-monitor-external-health
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: 读取探针脚本
        uses: actions/checkout@v4

      - name: 连续两次检查正式健康端点
        id: health_probe
        continue-on-error: true
        env:
          HEALTH_URL: ${{ inputs.health_url || 'https://stock-monitor-murex-one.vercel.app/api/health' }}
        run: |
          python3 ops/health-monitor/probe.py \
            --url "$HEALTH_URL" \
            --attempts 2 \
            --delay 60 \
            --timeout 15

      - name: 创建或更新故障事项
        if: steps.health_probe.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: '[系统健康] 股票监测助手外部探针失败'
        run: |
          ISSUE_NUMBER="$(gh issue list --state open --limit 100 --json number,title --jq '.[] | select(.title == "[系统健康] 股票监测助手外部探针失败") | .number' | head -n 1)"
          BODY="外部探针已在同一轮连续失败2次。\n\n检测时间（UTC）：$(date -u '+%Y-%m-%dT%H:%M:%SZ')\n\n请依次检查 Vercel、ngrok、FastAPI 和后台任务状态。\n\n运行记录：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -z "$ISSUE_NUMBER" ]; then
            gh issue create --title "$ISSUE_TITLE" --body "$BODY"
          else
            gh issue edit "$ISSUE_NUMBER" --body "$BODY"
          fi

      - name: 健康恢复后关闭故障事项
        if: steps.health_probe.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="$(gh issue list --state open --limit 100 --json number,title --jq '.[] | select(.title == "[系统健康] 股票监测助手外部探针失败") | .number' | head -n 1)"
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "外部健康探针已恢复。恢复时间（UTC）：$(date -u '+%Y-%m-%dT%H:%M:%SZ')。"
            gh issue close "$ISSUE_NUMBER" --reason completed
          fi

      - name: 将连续失败标记为工作流失败
        if: always() && steps.health_probe.outcome == 'failure'
        run: exit 1
